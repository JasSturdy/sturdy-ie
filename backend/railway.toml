# Railway configuration for Payload CMS backend (Next.js)
# Ensure Root Directory is set to "backend" in Railway Dashboard:
# Service Settings → Source → Root Directory = backend

[build]
builder = "nixpacks"
buildCommand = "corepack enable pnpm && pnpm install && pnpm run build"

[deploy]
startCommand = "npm run start"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10
